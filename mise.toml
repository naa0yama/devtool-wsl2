[tools]
"aqua:bats-core/bats-core" = "latest"
"cargo:cargo-sweep" = "0.8.0"
"cargo:topgrade" = "latest"
awscli = { version = "latest", symlink_bins = "true" }
chezmoi = "2.71.0"
dprint = "0.55.1"
dua = "2.34.0"
fzf = "0.72.0"
ghq = "1.10.1"
github-cli = "2.92.0"
gitleaks = "8.30.1"
lefthook = "2.1.6"
node = "24"
ripgrep = "latest"
shellcheck = "latest"
starship = "latest"
tmux = "3.6a"
usage = "latest"

[tasks.pre-commit]
description = "Run pre-commit checks"
run = '''
#!/usr/bin/env bash
set -euo pipefail

staged_files="$(git diff --name-only --diff-filter=d --staged)"

# dprint fmt
if echo "${staged_files}" | grep -qE '\.(json|jsonc|md|toml|yml|yaml)$'; then
	dprint fmt --staged
fi

# docker build
if echo "${staged_files}" | grep -qE '^Dockerfile$'; then
	docker build --tag tmp --file Dockerfile .
fi
'''

[tasks.pre-push]
description = "Run pre-push checks"
run = '''
#!/usr/bin/env bash
set -euo pipefail

staged_files="$(git diff --name-only --diff-filter=d --staged)"

# dprint fmt
if echo "${staged_files}" | grep -qE '\.(json|jsonc|md|toml|yml|yaml)$'; then
	dprint fmt --staged
fi

# docker build
if echo "${staged_files}" | grep -qE '^Dockerfile$'; then
	docker build --tag tmp --file Dockerfile .
fi
'''

[tasks.install-claude-code]
description = "Install Claude Code to ~/.local/bin via official installer"
run = """
#!/usr/bin/env bash
set -euo pipefail
case "$(uname -s)" in
	Linux|Darwin) ;;
	*) echo "Unsupported OS: $(uname -s)" >&2; exit 1 ;;
esac
curl -fsSL https://claude.ai/install.sh | bash
"""
