#cloud-config
# Static NoCloud user-data for the build.yml kvm-test job.
# The guest writes all test output to the serial console (ttyS0, captured as
# console.log on the runner); the runner greps for the DEVTOOL_VM_TEST
# sentinel. Full flow: docs/specs/ci/vm-boot-test.md
write_files:
  - path: /opt/devtool-vm-test.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      # WHY-NOT: ssh-based verification — 40-cleanup-ubuntu.sh deletes the
      #   stock "ubuntu" user mid-provision (DEVTOOL_ENV=vm) and a cloud-init
      #   "users:" entry would conflict with 15-user.sh; the serial sentinel
      #   needs no guest credentials at all.
      set -euo pipefail
      exec > /dev/ttyS0 2>&1

      # 10.0.2.2 = QEMU user-mode networking host gateway; the runner serves
      # the PR checkout there via `python3 -m http.server 8000`.
      UPSTREAM="http://10.0.2.2:8000"

      PASSED=""
      _on_exit() {
      	if [[ -z "${PASSED}" ]]; then
      		echo "===== /var/log/cloud-init-output.log (tail) ====="
      		tail --lines=200 /var/log/cloud-init-output.log 2> /dev/null || true
      		echo "DEVTOOL_VM_TEST: FAIL"
      	fi
      	poweroff
      }
      trap _on_exit EXIT

      echo "DEVTOOL_VM_TEST: bootstrap begin epoch=$(date +%s)"
      curl --fail --silent --show-error --location "${UPSTREAM}/scripts/provision/bootstrap.sh" \
      	| UPSTREAM="${UPSTREAM}" DEVTOOL_SRC_URL="${UPSTREAM}/devtool-src.tar.gz" bash

      echo "DEVTOOL_VM_TEST: verify begin epoch=$(date +%s)"
      curl --fail --silent --show-error --location \
      	--output /opt/devtool-verify.sh "${UPSTREAM}/tests/vm/verify.sh"
      bash /opt/devtool-verify.sh

      echo "DEVTOOL_VM_TEST: end epoch=$(date +%s)"
      PASSED=1
      echo "DEVTOOL_VM_TEST: PASS"

runcmd:
  - [bash, /opt/devtool-vm-test.sh]
