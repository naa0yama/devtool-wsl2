#cloud-config
# Static NoCloud user-data for the build.yml kvm-test job.
# The guest writes all test output to the serial console (ttyS0, captured as
# console.log on the runner); the runner greps for the DEVTOOL_VM_TEST
# sentinel. Full flow: docs/specs/ci/vm-boot-test.md

write_files:
  - path: /etc/apt/apt.conf.d/80-devtool-vm-test-retries
    permissions: "0644"
    content: |
      # WHY-NOT: this raises retries/timeout only for the CI guest, not
      #   scripts/provision/ — end users outside GitHub Actions do not hit
      #   the archive.ubuntu.com/runner-network flakiness this works around,
      #   so it stays scoped to tests/vm/user-data.yaml.
      Acquire::Retries "5";
      Acquire::http::Timeout "60";
  - path: /opt/devtool-vm-test.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      # WHY-NOT: ssh-based verification — 40-cleanup-ubuntu.sh deletes the
      #   stock "ubuntu" user mid-provision (DEVTOOL_ENV=vm) and a cloud-init
      #   "users:" entry would conflict with 15-user.sh; the serial sentinel
      #   needs no guest credentials at all.
      set -euo pipefail
      exec > /dev/ttyS0 2>&1

      # 10.0.2.2 = QEMU user-mode networking host gateway; the runner serves
      # the PR checkout there via `python3 -m http.server 8000`.
      UPSTREAM="http://10.0.2.2:8000"

      PASSED=""
      _on_exit() {
      	if [[ -z "${PASSED}" ]]; then
      		echo "===== /var/log/cloud-init-output.log (tail) ====="
      		tail --lines=200 /var/log/cloud-init-output.log 2> /dev/null || true
      		echo "DEVTOOL_VM_TEST: FAIL"
      	fi
      	poweroff
      }
      trap _on_exit EXIT

      # WHY: prior runs stalled inside apt fetching from the external
      #   mirror over QEMU usermode networking; this probe captures
      #   guest-to-internet throughput so a repeat stall can be
      #   distinguished from a guest-to-host (UPSTREAM) issue. Reads the
      #   guest's own codename so the probe hits the same archive path
      #   apt uses (the matrix runs both noble and resolute against this
      #   same static file).
      echo "DEVTOOL_VM_TEST: net probe begin epoch=$(date +%s)"
      . /etc/os-release
      curl --silent --show-error --location --max-time 30 \
      	--retry 2 --retry-delay 2 --retry-connrefused \
      	--output /dev/null --write-out "DEVTOOL_VM_TEST: net probe speed=%{speed_download} bytes/s\n" \
      	"http://archive.ubuntu.com/ubuntu/dists/${VERSION_CODENAME}/Release" || true

      echo "DEVTOOL_VM_TEST: bootstrap begin epoch=$(date +%s)"
      curl --fail --silent --show-error --location "${UPSTREAM}/scripts/provision/bootstrap.sh" \
      	| UPSTREAM="${UPSTREAM}" DEVTOOL_SRC_URL="${UPSTREAM}/devtool-src.tar.gz" bash

      echo "DEVTOOL_VM_TEST: verify begin epoch=$(date +%s)"
      curl --fail --silent --show-error --location \
      	--output /opt/devtool-verify.sh "${UPSTREAM}/tests/vm/verify.sh"
      bash /opt/devtool-verify.sh

      echo "DEVTOOL_VM_TEST: end epoch=$(date +%s)"
      PASSED=1
      echo "DEVTOOL_VM_TEST: PASS"

runcmd:
  - [bash, /opt/devtool-vm-test.sh]
