---
name: Release Assets

# WHY-NOT: build.yml 統合 — provision tarball は WSL2 image build と無関係。
# 独立 job にすることで build.yml 失敗時も provision asset が upload できる。
on:
  pull_request:
    branches:
      - main
    types:
      - closed
  schedule:
    - cron: "00 02 1 * *"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create pre-release"
        required: false
        default: false
        type: boolean

jobs:
  release-assets:
    name: Package and upload provision assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      COMMIT_SHORT_SHA: "null"
    if: ${{ github.event.inputs.create_release == 'true' || github.event.pull_request.merged == true || github.event_name == 'schedule' }}

    steps:
      - name: Checkout from repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set short git commit SHA
        run: |
          set -eux
          calculatedSha=$(git rev-parse --short "${{ github.sha }}")
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> "$GITHUB_ENV"

      - name: Package provision assets
        run: |
          set -eux
          # WHY-NOT: --directory scripts/provision system user (no transform)
          # bootstrap.sh _stage0_provision_fetch uses --strip-components=1 on
          # extraction; tarball must carry devtool-provision/ as top-level dir
          # so strip lands files at DEVTOOL_PROVISION_DIR/{system,user,files}.
          # files/ is required: user scripts resolve PROVISION_ROOT via SCRIPT_DIR/..
          # and install config files from ${PROVISION_ROOT}/files/.
          tar --create --gzip --file devtool-provision.tar.gz \
            --directory scripts/provision \
            --transform 's|^|devtool-provision/|' \
            system user files
          cp scripts/provision/bootstrap.sh devtool-bootstrap.sh

      - name: Verify tarball contents
        run: |
          set -eux
          tar --list --file devtool-provision.tar.gz \
            | grep --extended-regexp "^devtool-provision/(system|user)/[0-9]+.*\.sh$"

      - name: Determine release type
        id: release_type
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            {
              echo "DRAFT=false"
              echo "PRERELEASE=false"
              echo "MAKE_LATEST=true"
            } >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            {
              echo "DRAFT=false"
              echo "PRERELEASE=true"
              echo "MAKE_LATEST=false"
            } >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.action }}" == "closed" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
            {
              echo "DRAFT=false"
              echo "PRERELEASE=false"
              echo "MAKE_LATEST=true"
            } >> "$GITHUB_ENV"
          else
            {
              echo "DRAFT=false"
              echo "PRERELEASE=false"
              echo "MAKE_LATEST=false"
            } >> "$GITHUB_ENV"
          fi

      - name: Upload provision assets to Release
        # WHY: build.yml が同一 COMMIT_SHORT_SHA で release を先に作成する前提。
        # softprops/action-gh-release は tag 既存でも upsert するため
        # WSL2 tar / qcow2 / provision tarball が同一 release に並ぶ。
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          name: devtool-WSL2 image ${{ env.COMMIT_SHORT_SHA }}
          tag_name: ${{ env.COMMIT_SHORT_SHA }}
          generate_release_notes: true
          draft: ${{ env.DRAFT }}
          prerelease: ${{ env.PRERELEASE }}
          make_latest: ${{ env.MAKE_LATEST }}
          files: |
            devtool-provision.tar.gz
            devtool-bootstrap.sh

      - name: Write asset summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Release Assets

          - `devtool-bootstrap.sh` — bootstrap.sh (bare Ubuntu 経路 curl entry point)
          - `devtool-provision.tar.gz` — provision scripts (system/ + user/)

          ### Tarball contents
          EOF
          tar --list --file devtool-provision.tar.gz >> "$GITHUB_STEP_SUMMARY"
