---
name: Build
on:
  pull_request:
    branches:
      - main
    types:
      - closed
      - opened
      - reopened
      - synchronize
      - auto_merge_enabled
  schedule:
    - cron: "00 02 1 * *"
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Disable cache for container build"
        required: false
        default: false
        type: boolean
      create_release:
        description: "Create pre-release"
        required: false
        default: false
        type: boolean

jobs:
  builds:
    name: WSL2 build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    env:
      COMMIT_SHORT_SHA: "null"

    steps:
      - name: Checkout from repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set short git commit SHA
        run: |+
          set -eux

          calculatedSha=$(git rev-parse --short ${{ github.sha }})
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_ENV

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/naa0yama/devtool-wsl2
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag,prefix=,enable=true

            # minimal (short sha)
            type=sha,enable=true,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            BUILD_REPOSITORY="${{ github.server_url }}/${{ github.repository }}"
            BUILD_BASE_REF="${{ github.base_ref || github.ref_name }}"
            BUILD_ACTION="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            BUILD_SHA="${{ github.sha }}"
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          # WHY: gha cache backend intermittently fails to reserve blob
          #   storage ("failed to reserve cache") even under quota; treat
          #   cache-export failure as non-fatal since the build itself
          #   (this step's real output) still succeeds.
          cache-to: type=gha,mode=max,ignore-error=true
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          outputs: type=tar,dest=dwsl2-${{ env.COMMIT_SHORT_SHA }}.tar
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Split archive file
        if: ${{ github.event.inputs.create_release == 'true' || github.event.pull_request.merged == true }}
        run: |
          set -eux
          mkdir -p dist
          gzip "dwsl2-${{ env.COMMIT_SHORT_SHA }}.tar"
          split --verbose --bytes=2000M --suffix-length=1 --numeric-suffixes=1 \
            "dwsl2-${{ env.COMMIT_SHORT_SHA }}.tar.gz" \
            "dist/dwsl2-${{ env.COMMIT_SHORT_SHA }}.tar.gz.part"
          sha256sum dist/dwsl2-*.tar.gz.part* > dist/sha256sum.txt
          ls -lah dist/

      - name: Cleanup pre-releases
        if: ${{ github.event.inputs.create_release == 'true' || github.event.pull_request.merged == true }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |+
            const __prereleases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const prereleases = __prereleases.data

            for (const index in prereleases) {
              if (prereleases[index].prerelease == true || prereleases[index].draft == true) {
                console.log('delete pre-release & draft ' + prereleases[index]['id'] + '\t' + prereleases[index]['name'])

                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: prereleases[index]['id'],
                });
              }
            }

            console.log('end run')

      - name: Determine if PR is from a bot
        id: check_bot
        run: |
          if [[ "${{ github.actor }}" == *[bot]* ]]; then
            echo "IS_BOT=true" >> $GITHUB_ENV
          else
            echo "IS_BOT=false" >> $GITHUB_ENV
          fi

      - name: Determine release type
        id: release_type
        if: ${{ github.event.inputs.create_release == 'true' || github.event.pull_request.merged == true }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "MAKE_LATEST=true" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: create as pre-release
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=true" >> $GITHUB_ENV
            echo "MAKE_LATEST=false" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.action }}" != "closed" && "$IS_BOT" == "false" ]]; then
            echo "DRAFT=true" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "MAKE_LATEST=false" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.action }}" == "closed" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "MAKE_LATEST=true" >> $GITHUB_ENV
          else
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "MAKE_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        if: ${{ github.event.inputs.create_release == 'true' || github.event.pull_request.merged == true }}
        with:
          name: devtool-WSL2 image ${{ env.COMMIT_SHORT_SHA }}
          tag_name: ${{ env.COMMIT_SHORT_SHA }}
          generate_release_notes: true
          draft: ${{ env.DRAFT }}
          prerelease: ${{ env.PRERELEASE }}
          make_latest: ${{ env.MAKE_LATEST }}
          files: |
            ./dist/*

      - name: Write installation command to summary
        if: ${{ github.event.inputs.create_release == 'true' || github.event.pull_request.merged == true }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Installation Command

          \`\`\`powershell
          \$tag = '${{ env.COMMIT_SHORT_SHA }}'
          \$repo = '${{ github.repository }}'
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/\$repo/refs/heads/${{ github.ref_name }}/devtool.ps1" -OutFile 'devtool.ps1'
          .\devtool.ps1 -skipBackupAndRestore -skipWSLDefault -Tag \$tag
          \`\`\`
          EOF

  lxc-test:
    name: LXC bootstrap test (${{ matrix.series }})
    needs: builds
    runs-on: ubuntu-latest
    # WHY-NOT: run on merged PR (action == 'closed') — the immediately
    #   preceding synchronize event already validated the identical merge
    #   content, and `builds` (release upload) does not depend on this job,
    #   so a repeat run adds no new information.
    if: ${{ github.event.action != 'closed' }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        series: [noble, resolute]

    steps:
      - name: Checkout from repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Ensure LXD is available
        run: |
          # WHY-NOT: assume preinstalled — GH-hosted runner images have
          #   dropped/re-added the lxd snap across image revisions; probing
          #   first keeps this job working either way without a hard
          #   dependency on current runner-image contents.
          if ! command -v lxc > /dev/null 2>&1; then
            sudo snap install lxd
          fi
          sudo lxd waitready
          sudo lxd init --auto

          # WHY: Docker is preinstalled and running on GH-hosted runners and
          #   sets the iptables FORWARD chain's default policy to DROP,
          #   accepting only its own docker0/network bridges explicitly.
          #   lxdbr0 is created afterward, so its traffic hits that default
          #   DROP — confirmed via net-probe showing 0 bytes/s guest-to-
          #   internet despite host-to-container bridge traffic working
          #   fine. Explicitly accepting lxdbr0 forwarding restores egress.
          sudo iptables -I FORWARD -i lxdbr0 -j ACCEPT
          sudo iptables -I FORWARD -o lxdbr0 -j ACCEPT

      - name: Serve PR checkout for guest fetch
        run: |
          # WHY-NOT: github.com archive/<sha> — fork PRs have no fetchable
          #   merge-commit archive on github.com without extra API calls;
          #   serving the local checkout works uniformly for same-repo and
          #   fork PRs alike.
          git archive --format=tar.gz --prefix=devtool-src/ --output=devtool-src.tar.gz HEAD
          mkdir --parents www/scripts/provision www/tests/vm
          cp devtool-src.tar.gz www/
          cp scripts/provision/bootstrap.sh www/scripts/provision/bootstrap.sh
          cp tests/vm/verify.sh www/tests/vm/verify.sh
          python3 -m http.server 8000 --directory www &

      - name: Launch LXC container (${{ matrix.series }})
        run: |
          # WHY: `security.nesting=true` is required for dockerd to run
          #   inside the container (nested containerization); without it
          #   the docker layer of bootstrap.sh fails to start.
          # WHY-NOT: unconditional `ubuntu:` remote — it only carries
          #   released series; a matrix entry named before its stable
          #   release would hard-fail here. Fall back to `ubuntu-daily:`
          #   (devel/interim builds) so adding a not-yet-released series
          #   to the matrix does not require a workflow change.
          if ! sudo lxc launch "ubuntu:${{ matrix.series }}" c1 -c security.nesting=true; then
            echo "ubuntu:${{ matrix.series }} not found, falling back to ubuntu-daily:${{ matrix.series }}" >&2
            sudo lxc launch "ubuntu-daily:${{ matrix.series }}" c1 -c security.nesting=true
          fi
          # WHY: `ubuntu:` images ship LXD's own cloud-init datasource (not
          #   NoCloud); waiting for it to settle avoids racing bootstrap.sh
          #   against a container whose network/apt sources are not yet up.
          timeout 120 sudo lxc exec c1 -- cloud-init status --wait

          # WHY: computed once here (not re-derived per `lxc exec` call) —
          #   the LXD bridge gateway is stable for the container's lifetime;
          #   exporting via GITHUB_ENV lets later steps reference it as a
          #   plain string instead of re-running `ip route`/`awk` inside
          #   each nested `bash -c`. UPSTREAM is derived from GATEWAY here
          #   too (not re-derived per step) so later steps reference a
          #   single plain string instead of rebuilding the same literal.
          GATEWAY="$(sudo lxc exec c1 -- bash -c 'ip route show default' | awk '{print $3}')"
          echo "GATEWAY=${GATEWAY}" >> "$GITHUB_ENV"
          echo "UPSTREAM=http://${GATEWAY}:8000" >> "$GITHUB_ENV"

      - name: Probe guest-to-internet apt throughput (diagnostic)
        run: |
          # WHY: kept as a low-cost diagnostic seam — if a bulk-fetch stall
          #   reappears, this isolates guest-to-internet throughput from a
          #   bootstrap-internal cause. The equivalent host-side probe from
          #   the qemu job is dropped: the WSL2 build job (`builds`, same
          #   runner) already exercises host egress successfully every run.
          sudo lxc exec c1 -- bash -c '
            . /etc/os-release
            curl --silent --show-error --location --max-time 30 \
              --retry 2 --retry-delay 2 --retry-connrefused \
              --output /dev/null --write-out "DEVTOOL_VM_TEST: net probe speed=%{speed_download} bytes/s\n" \
              "http://archive.ubuntu.com/ubuntu/dists/${VERSION_CODENAME}/Release"
          ' | tee net-probe.log || echo "DEVTOOL_VM_TEST: net probe failed" | tee -a net-probe.log

      - name: Run bootstrap.sh in container
        run: |
          # WHY: `lxc exec` is a synchronous call that returns the guest
          #   command's exit code directly — unlike the qemu job this
          #   replaces, no serial-console sentinel string is needed to
          #   detect pass/fail.
          echo "DEVTOOL_VM_TEST: bootstrap begin epoch=$(date +%s)" | tee -a net-probe.log
          # WHY: UPSTREAM is resolved once in the "Launch LXC container" step
          #   and substituted here by GitHub Actions expression evaluation
          #   (not by the inner shell) — this avoids re-deriving it via
          #   `ip route`/`awk` inside every nested `bash -c`.
          UPSTREAM="${{ env.UPSTREAM }}"
          sudo lxc exec c1 -- bash -c '
            set -euo pipefail
            curl --fail --silent --show-error --location "'"${UPSTREAM}"'/scripts/provision/bootstrap.sh" \
              | UPSTREAM="'"${UPSTREAM}"'" DEVTOOL_SRC_URL="'"${UPSTREAM}"'/devtool-src.tar.gz" DEVTOOL_ENV=vm bash
          '
          echo "DEVTOOL_VM_TEST: bootstrap end epoch=$(date +%s)" | tee -a net-probe.log

      - name: Run verify.sh in container
        run: |
          echo "DEVTOOL_VM_TEST: verify begin epoch=$(date +%s)" | tee -a net-probe.log
          UPSTREAM="${{ env.UPSTREAM }}"
          sudo lxc exec c1 -- bash -c '
            set -euo pipefail
            curl --fail --silent --show-error --location \
              --output /opt/devtool-verify.sh "'"${UPSTREAM}"'/tests/vm/verify.sh"
            bash /opt/devtool-verify.sh
          '
          echo "DEVTOOL_VM_TEST: verify end epoch=$(date +%s)" | tee -a net-probe.log

      - name: Write phase timing summary
        if: ${{ always() }}
        run: |
          {
            echo "## LXC bootstrap test timing (${{ matrix.series }})"
            echo ''
            echo '```'
            grep --extended-regexp "^DEVTOOL_VM_TEST:" net-probe.log 2> /dev/null || echo "no probe log captured"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect container log
        if: ${{ always() }}
        run: |
          sudo lxc exec c1 -- journalctl --no-pager > container.log 2> /dev/null || echo "no container log captured" > container.log

      - name: Upload container log
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devtool-${{ matrix.series }}-lxc-log
          path: |
            container.log
            net-probe.log
          retention-days: 7
